name: Build, Scan & Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Build & export image for scanning (no push yet)
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags:   ${{ steps.meta.outputs.tags }}
      image-labels: ${{ steps.meta.outputs.labels }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Required for multi-platform (amd64 + arm64) builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag semver releases:  v1.2.3  →  1.2.3, 1.2, 1, latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Tag branch pushes:  main  →  main
            type=ref,event=branch
            # Tag PRs:  pr-42
            type=ref,event=pr
            # Always tag the git sha for traceability
            type=sha,format=short

      # Build amd64 only for the scan artifact (arm64 cannot be exported to docker tar)
      # The full multi-arch build happens in the publish job
      - name: Build image for scanning (amd64 only)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload image tarball for scan job
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Trivy security scan
  # ─────────────────────────────────────────────────────────────────────────
  scan:
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Download image tarball
        uses: actions/download-artifact@v8
        with:
          name: docker-image
          path: /tmp

      - name: Load image into Docker
        run: docker load --input /tmp/image.tar

      - name: Run Trivy vulnerability scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/image.tar
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Run Trivy scan (table summary in logs)
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/image.tar
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Push multi-arch image to GHCR (amd64 + arm64)
  # ─────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to GHCR (amd64 + arm64)
    runs-on: ubuntu-latest
    needs: [build, scan]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # QEMU allows building arm64 binaries on amd64 GitHub runners
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=sha,format=short

      # Build and push both platforms — layer cache from build job makes this fast
      - name: Build and push multi-arch image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
